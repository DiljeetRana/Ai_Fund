<!DOCTYPE html>
<html>

    <title>FundAI - Redirecting...</title>
    <script type="text/javascript">
      // Simple SPA redirect hack for static hosting
      var path = window.location.pathname;
      window.location.replace('/' + (path.startsWith('/') ? path.slice(1) : path));
    </script>
  </head>
